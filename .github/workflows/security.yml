name: Security

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  go-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true
      - run: go test ./internal/... ./pkg/...
      - run: CGO_ENABLED=0 go tool govulncheck ./...
      - run: go run github.com/securego/gosec/v2/cmd/gosec@v2.26.1 -exclude-generated ./...
