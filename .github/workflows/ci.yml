name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  go-format:
    name: runner / gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(git ls-files '*.go'))"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi

  golangci-lint:
    name: runner / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: false
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          args: --timeout=15m

  yamllint:
    name: runner / yamllint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-yamllint@v1
        with:
          fail_level: error
          reporter: github-pr-review
          yamllint_flags: '-d "{extends: default, rules: {truthy: disable}}" .'

  hadolint:
    name: runner / hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: reviewdog/action-hadolint@v1
        with:
          fail_level: error
          reporter: github-pr-review

  dotenv-linter:
    name: runner / dotenv-linter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dotenv-linter/action-dotenv-linter@v3
        with:
          reporter: github-pr-review

  check-dependencies:
    name: runner / check-dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: WriteGoList
        run: go list -json -m all > go.list
      - name: Nancy
        uses: sonatype-nexus-community/nancy-github-action@main
        continue-on-error: true

  unit-tests:
    name: runner / tests / unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Unit Tests
        run: >
          go test -v -race -covermode atomic -coverprofile=coverage.txt
          ./internal/... ./pkg/...
      - name: Upload coverage report
        run: bash <(curl -s https://codecov.io/bash)

  integration-tests:
    name: runner / tests / integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Integration tests
        run: >
          docker compose -f docker-compose.yml
          -f docker-compose-integration-test.yml
          up --build --abort-on-container-exit
          --exit-code-from integration-test
      - name: Cleanup integration stack
        if: always()
        run: >
          docker compose -f docker-compose.yml
          -f docker-compose-integration-test.yml
          down --remove-orphans --volumes
